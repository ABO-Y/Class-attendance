<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUST - Mark Attendance</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="navbar"></div>
<div id="toast-container" class="toast-container"></div>

<div class="container">
    <h1>✏️ Mark Attendance</h1>

    <div class="card" style="background-color: #f8f9fa; margin-bottom: 20px;">
        <p><strong>Module:</strong> Introduction to Software Engineering (PRG611S)</p>
        <p><strong>Date:</strong> <span id="current-date"></span></p>
        <p><strong>Lecturer:</strong> <span id="lecturer-name"></span></p>
    </div>

    <div id="lecturer-summary" class="summary-grid"></div>
    <div id="history-panel" class="module-history"></div>

    <form id="attendance-form">
        <h2 style="color: #003366; border-bottom: 2px solid #003366; padding-bottom: 10px; margin: 20px 0;">Student Attendance</h2>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Student Name</th>
                        <th>Student Number</th>
                        <th style="text-align: center;">Mark Present</th>
                    </tr>
                </thead>
                <tbody id="attendance-table">
                    <!-- Will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <button type="submit" class="btn btn-success btn-block">Submit Attendance</button>
    </form>

    <div id="success-message" class="alert alert-success hidden" style="margin-top: 20px;">
        ✅ Attendance saved successfully! Students will see updates on their dashboards.
    </div>
</div>

<script src="auth.js"></script>
<script>
// Verify lecturer access
if (!checkAuth('lecturer')) {
    window.location.href = 'index.html';
}

// Initialize navbar
renderNavbar('Mark Attendance');

// Lecturer to Module mapping
const lecturerModules = {
    'L001': {
        code: 'MAP7111S',
        name: 'Mobile Application Programming',
        students: [
            { name: 'Gowaseb Immanuel', number: '222028866' },
            { name: 'Ebuke Onyeka', number: '223045756' },
            { name: 'Undamuje Kahiiko', number: '223052574' },
            { name: 'Kamenye Naomi', number: '221019855' }
        ]
    },
    'L002': {
        code: 'SPS611S',
        name: 'Software Process',
        students: [
            { name: 'Gowaseb Immanuel', number: '222028866' },
            { name: 'Ebuke Onyeka', number: '223045756' },
            { name: 'Undamuje Kahiiko', number: '223052574' },
            { name: 'Kamenye Naomi', number: '221019855' }
        ]
    },
    'L003': {
        code: 'DSA611S',
        name: 'Data Structures & Algorithms',
        students: [
            { name: 'Gowaseb Immanuel', number: '222028866' },
            { name: 'Ebuke Onyeka', number: '223045756' }
        ]
    },
    'L004': {
        code: 'CTE611S',
        name: 'Compiler Techniques',
        students: [
            { name: 'Undamuje Kahiiko', number: '223052574' },
            { name: 'Kamenye Naomi', number: '221019855' }
        ]
    }
};

let currentModuleData = null;

function renderLecturerSummary(history) {
    const totalSessions = history.length;
    const averageAttendance = totalSessions > 0 ? Math.round(history.reduce((sum, s) => sum + s.percentage, 0) / totalSessions) : 0;
    const mostRecent = history.length ? history[0] : null;
    const presentCount = history.reduce((sum, s) => sum + s.presentStudents.length, 0);
    const absentCount = history.reduce((sum, s) => sum + (s.totalStudents - s.presentStudents.length), 0);

    document.getElementById('lecturer-summary').innerHTML = `
        <div class="summary-card">
            <h3>${totalSessions}</h3>
            <p>Sessions Logged</p>
        </div>
        <div class="summary-card">
            <h3>${averageAttendance}%</h3>
            <p>Avg. Class Attendance</p>
        </div>
        <div class="summary-card">
            <h3>${presentCount}</h3>
            <p>Total Presences</p>
        </div>
        <div class="summary-card">
            <h3>${absentCount}</h3>
            <p>Total Absences</p>
        </div>
        <div class="summary-card" style="background-color: #fff3cd; color: #856404;">
            <h3>${mostRecent ? formatTimestamp(mostRecent.submittedAt) : 'N/A'}</h3>
            <p>Last Submission</p>
        </div>
    `;
}

function renderHistoryPanel(history) {
    const historyPanel = document.getElementById('history-panel');
    if (!historyPanel) return;

    if (!history.length) {
        historyPanel.innerHTML = '<p style="color: #666;">No attendance sessions saved yet. Record a session to build history.</p>';
        return;
    }

    historyPanel.innerHTML = `
        <table class="history-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Present</th>
                    <th>Absent</th>
                    <th>Attendance %</th>
                </tr>
            </thead>
            <tbody>
                ${history.map(entry => `
                    <tr>
                        <td>${formatTimestamp(entry.submittedAt)}</td>
                        <td>${entry.presentStudents.length}</td>
                        <td>${entry.totalStudents - entry.presentStudents.length}</td>
                        <td>${entry.percentage}%</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

function initializePage() {
    const lecturer = auth.getCurrentUser();
    const lecturerId = lecturer.id;
    currentModuleData = lecturerModules[lecturerId];
    
    if (!currentModuleData) {
        document.querySelector('.container').innerHTML = `
            <div class="alert alert-danger">
                <strong>Error:</strong> No module assigned to this lecturer account.
            </div>
        `;
        return;
    }

    document.getElementById('lecturer-name').textContent = lecturer.name;

    const today = new Date();
    document.getElementById('current-date').textContent = today.toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });

    document.querySelector('.card').innerHTML = `
        <p><strong>Module:</strong> ${currentModuleData.code} - ${currentModuleData.name}</p>
        <p><strong>Date:</strong> <span id="current-date"></span></p>
        <p><strong>Lecturer:</strong> ${lecturer.name}</p>
    `;
    
    document.querySelector('#current-date').textContent = today.toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });

    const tbody = document.getElementById('attendance-table');
    tbody.innerHTML = currentModuleData.students.map((student, index) => `
        <tr>
            <td>${student.name}</td>
            <td>${student.number}</td>
            <td style="text-align: center;">
                <input 
                    type="checkbox" 
                    class="student-checkbox"
                    data-student="${student.number}"
                    data-name="${student.name}"
                    ${index === 0 ? 'checked' : ''}
                    style="width: 20px; height: 20px; cursor: pointer;">
            </td>
        </tr>
    `).join('');

    const history = getAttendanceHistory(currentModuleData.code);
    renderLecturerSummary(history);
    renderHistoryPanel(history);


function showSubmissionMessage(message, type = 'success') {
    showToast(message, type);
    const successMsg = document.getElementById('success-message');
    successMsg.textContent = message;
    successMsg.classList.remove('hidden');
    setTimeout(() => {
        successMsg.classList.add('hidden');
    }, 4200);
}

// Handle form submission
const attendanceForm = document.getElementById('attendance-form');
attendanceForm.addEventListener('submit', function(e) {
    e.preventDefault();

    const checkboxes = document.querySelectorAll('.student-checkbox');
    const presentStudents = Array.from(checkboxes)
        .filter(cb => cb.checked)
        .map(cb => ({
            studentNumber: cb.dataset.student,
            studentName: cb.dataset.name,
            present: true
        }));

    if (presentStudents.length === 0) {
        showToast('Please select at least one present student before saving.', 'error');
        return;
    }

    const totalStudents = checkboxes.length;
    const presentCount = presentStudents.length;
    const percentage = Math.round((presentCount / totalStudents) * 100);

    const attendanceData = {
        courseCode: currentModuleData.code,
        courseName: currentModuleData.name,
        percentage: percentage,
        presentStudents: presentStudents,
        totalStudents: totalStudents,
        submittedAt: new Date().toISOString(),
        submittedBy: auth.getCurrentUser().name
    };

    saveAttendanceSession(currentModuleData.code, attendanceData);
    renderLecturerSummary(getAttendanceHistory(currentModuleData.code));
    renderHistoryPanel(getAttendanceHistory(currentModuleData.code));
    showSubmissionMessage('Attendance saved successfully! Students will see updates on their dashboards.');
    console.log('Attendance submitted:', attendanceData);
});
}
window.onload = initializePage;
</script>

</body>
</html>
