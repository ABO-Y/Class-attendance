<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUST Attendance System - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <h1>NUST</h1>
        <p class="subtitle">Class Attendance Tracking System</p>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <input type="text" id="username" name="username" placeholder="e.g. 222028866 or L001 or admin" required autofocus>
                <div id="username-error" class="error"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                    <button type="button" id="toggle-password" class="btn btn-secondary" style="position: absolute; right: 0; top: 0; height: 100%; border-radius: 0 6px 6px 0;">Show</button>
                </div>
                <div id="password-error" class="error"></div>
            </div>

            <div id="login-error" class="alert alert-danger hidden"></div>

            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
    </div>
</div>

<script src="auth.js"></script>
<script>
function handleLogin(event) {
    event.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('login-error');

    // Validate input
    if (!username.trim() || !password.trim()) {
        errorDiv.textContent = 'Please enter both username and password';
        errorDiv.classList.remove('hidden');
        return;
    }

    // Attempt login
    const result = auth.login(username, password);

    if (result.success) {
        errorDiv.classList.add('hidden');
        
        // Redirect based on role
        const redirects = {
            'student': 'student.html',
            'lecturer': 'lecturer.html',
            'admin': 'admin.html'
        };

        const redirectUrl = redirects[result.user.role] || 'student.html';
        window.location.href = redirectUrl;
    } else {
        errorDiv.textContent = result.message;
        errorDiv.classList.remove('hidden');
        document.getElementById('password').value = '';
    }
}

// If already logged in, redirect to appropriate dashboard
if (auth.isLoggedIn()) {
    const redirects = {
        'student': 'student.html',
        'lecturer': 'lecturer.html',
        'admin': 'admin.html'
    };
    const redirectUrl = redirects[auth.getUserRole()] || 'student.html';
    window.location.href = redirectUrl;
}

const togglePassword = document.getElementById('toggle-password');
if (togglePassword) {
    togglePassword.addEventListener('click', () => {
        const passwordInput = document.getElementById('password');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            togglePassword.textContent = 'Hide';
        } else {
            passwordInput.type = 'password';
            togglePassword.textContent = 'Show';
        }
    });
}
</script>

</body>
</html>
